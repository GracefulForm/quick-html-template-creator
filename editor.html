rea{width:100%;height:auto}.ad-container{background:#eaeaea;border-top:1px solid #ccc;padding:10px;display:flex;justify-content:center;align-items:center;min-height:70px;flex-shrink:0}.ad-placeholder{color:#666;font-size:12px;font-weight:700;border:1px dashed #bbb;padding:12px 40px;background:#fff}

<script>
const workspace=document.getElementById("workspace"),resizer=document.getElementById("resizer"),textarea=document.getElementById("code"),iframe=document.getElementById("preview"),copyBtn=document.getElementById("copyBtn"); let isDragging=!1; function updatePreview(){iframe.srcdoc=textarea.value} function changePreviewSize(e){document.querySelectorAll(".toolbar-group button").forEach(e=>e.classList.remove("active")),"mobile"===e?(document.getElementById("size-mobile").classList.add("active"),iframe.style.width="375px",iframe.style.height="667px"):"tablet"===e?(document.getElementById("size-tablet").classList.add("active"),iframe.style.width="768px",iframe.style.height="1024px"):(document.getElementById("size-desktop").classList.add("active"),iframe.style.width="100%",iframe.style.height="100%")} function toggleLayout(){ let e=document.querySelector(".preview-container");workspace.classList.contains("row")?(workspace.classList.replace("row","col"),resizer.removeAttribute("data-dir")):(workspace.classList.replace("col","row"),resizer.setAttribute("data-dir","row")),textarea.style.flex="1 1 50%",e.style.flex="1 1 50%"} function copyCode(){navigator.clipboard.writeText(textarea.value).then(()=>{ let e=copyBtn.innerHTML;copyBtn.innerHTML="✅ Copied!",copyBtn.style.background="#28a745",setTimeout(()=>{copyBtn.innerHTML=e,copyBtn.style.background=""},1500)})}resizer.addEventListener("mousedown",e=>{isDragging=!0;document.body.classList.add("dragging");iframe.style.pointerEvents="none";});document.addEventListener("mousemove",e=>{ if (!isDragging) return ; let t=workspace.getBoundingClientRect(),i=document.querySelector(".preview-container"); if (workspace.classList.contains("row")){ let r=(e.clientX-t.left)/t.width*100;r>10&&r<90&&(textarea.style.flex=`0 0 ${r}%`,i.style.flex=`0 0 ${100-r}%`)} else { let a=(e.clientY-t.top)/t.height*100;a>10&&a<90&&(textarea.style.flex=`0 0 ${a}%`,i.style.flex=`0 0 ${100-a}%`)}});document.addEventListener("mouseup",()=>{ if (isDragging){isDragging=!1;document.body.classList.remove("dragging");iframe.style.pointerEvents="auto";}}); let typingTimer;window.addEventListener("load",updatePreview);textarea.addEventListener("input",()=>{clearTimeout(typingTimer);typingTimer=setTimeout(updatePreview,300);});
</script>
